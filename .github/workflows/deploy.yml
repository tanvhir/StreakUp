name: 🚀 Build and Deploy to InfinityFree

on:
  push:
    branches:
      - main
      - master

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      # 1. Get latest code from GitHub Repository
      - name: 🚚 Get latest code
        uses: actions/checkout@v4

      # 2. Setup Bun Runtime
      - name: ⚙️ Setup Bun
        uses: oven-sh/setup-bun@v1
        with:
          bun-version: latest

      # 3. Install dependencies
      - name: 📦 Install dependencies
        run: bun install

      # 4. Build project
      - name: 🏗️ Build project
        run: bun run build

      # 5. Copy PHP files to dist directory
      - name: 📋 Copy PHP files
        run: |
          cp install.php dist/
          cp config.php dist/
          cp api.php dist/
          cp index.php dist/
          cp .htaccess dist/

      # 6. Sync static dist files via FTP to InfinityFree
      - name: 📂 Sync files via FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.4
        with:
          server: ftpupload.net
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          local-dir: ./dist/
          server-dir: ./htdocs/
